        const yieldThread = () => new Promise(resolve => setTimeout(resolve, 10));
        const parseRange = (rangeStr, maxPages) => {
            if (!rangeStr || !rangeStr.trim()) return Array.from({length: maxPages}, (_, i) => i + 1);
            const pages = new Set();
            rangeStr.split(',').forEach(part => {
                const bounds = part.split('-').map(n => parseInt(n.trim()));
                if (bounds.length === 1 && !isNaN(bounds[0])) pages.add(bounds[0]);
                else if (bounds.length === 2 && !isNaN(bounds[0]) && !isNaN(bounds[1])) {
                    for (let i = Math.min(bounds[0], bounds[1]); i <= Math.max(bounds[0], bounds[1]); i++) pages.add(i);
                }
            });
            return Array.from(pages).filter(p => p >= 1 && p <= maxPages).sort((a,b)=>a-b);
        };

        function App() {
            const [lang, setLang] = useState(localStorage.getItem('ms_lang') || 'ar');
            const [theme, setTheme] = useState('dark'); 
            
            const [showSplash, setShowSplash] = useState(true);
            const [fadeSplash, setFadeSplash] = useState(false);
            
            const [showManual, setShowManual] = useState(false);
            const [manualTab, setManualTab] = useState(1);

            const [mode, setMode] = useState('files');
            const [items, setItems] = useState([]); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [status, setStatus] = useState("");
            const [progress, setProgress] = useState(0); 
            const [isTouchDevice, setIsTouchDevice] = useState(false);
            
            const abortRef = useRef(false);
            const [result, setResult] = useState(null); 
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const [settings, setSettings] = useState({ 
                filename: "", grid: 2, spacing: 5, marginType: 'none', 
                pageFormat: 'none', pagePosition: 'posCenter', watermark: '', quality: 'high' 
            });
            
            const [showSettingsDrawer, setShowSettingsDrawer] = useState(false);
            const [splitModal, setSplitModal] = useState({ isOpen: false, file: null, maxPages: 0, range: '', resolve: null });

            const fileInputRef = useRef(null);
            const dragItem = useRef();
            const dragOverItem = useRef();
            const t = translations[lang];
            const isAr = lang === 'ar';

            useEffect(() => {
                const fadeTimer = setTimeout(() => setFadeSplash(true), 2500); 
                const hideTimer = setTimeout(() => setShowSplash(false), 3000); 
                return () => { clearTimeout(fadeTimer); clearTimeout(hideTimer); };
            }, []);

            // Anti-Data Loss Protection
            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (items.length > 0 || isProcessing) {
                        e.preventDefault(); e.returnValue = ''; 
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [items.length, isProcessing]);

            // 🔥 PERFECT FIX: Default to Tab 1 every time Manual is opened
            useEffect(() => {
                if (showManual) setManualTab(1);
            }, [showManual]);

            useEffect(() => { setIsTouchDevice('ontouchstart' in window || navigator.maxTouchPoints > 0); }, []);
            
            useEffect(() => { 
                document.documentElement.dir = isAr ? 'rtl' : 'ltr'; 
                document.documentElement.lang = lang; 
                localStorage.setItem('ms_lang', lang);
            }, [lang, isAr]);

            useEffect(() => { 
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.body.classList.remove('light-mode-active');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.body.classList.add('light-mode-active');
                }
            }, [theme]);
            
            useEffect(() => { clearAll(); setResult(null); }, [mode]);

            const showNotification = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const abortProcess = () => { abortRef.current = true; };

            const cleanItemThumb = (thumb) => { if (thumb && thumb.startsWith('blob:')) URL.revokeObjectURL(thumb); };
            const clearAll = () => { items.forEach(item => cleanItemThumb(item.thumb)); setItems([]); setResult(null); setSettings(s => ({...s, filename: ""})); setProgress(0); };
            const removeItem = (id) => { const itemToRemove = items.find(i => i.id === id); if (itemToRemove) cleanItemThumb(itemToRemove.thumb); setItems(items.filter(item => item.id !== id)); };

            const handleDragStart = (e, position) => { dragItem.current = position; };
            const handleDragEnter = (e, position) => { dragOverItem.current = position; };
            const handleDrop = (e) => { const copyListItems = [...items]; const dragItemContent = copyListItems[dragItem.current]; copyListItems.splice(dragItem.current, 1); copyListItems.splice(dragOverItem.current, 0, dragItemContent); dragItem.current = null; dragOverItem.current = null; setItems(copyListItems); };
            
            const moveItem = (index, directionStr) => {
                let mathDir = directionStr === 'right' ? 1 : -1;
                if (isAr) mathDir = directionStr === 'right' ? -1 : 1; 
                const newIndex = index + mathDir;
                if (newIndex < 0 || newIndex >= items.length) return;
                const newItems = [...items]; const temp = newItems[index]; newItems[index] = newItems[newIndex]; newItems[newIndex] = temp; setItems(newItems); 
            };

            const addBlankSlide = () => setItems([...items, { id: `blank_${Date.now()}`, name: t.blankNote, type: 'blank', thumb: null, pagesCount: 1 }]);

            const promptPdfSplit = (file, maxPages) => new Promise(resolve => setSplitModal({ isOpen: true, file, maxPages, range: '', resolve }));
            const handleSplitConfirm = () => {
                const targetPages = parseRange(splitModal.range, splitModal.maxPages);
                const resolveFunc = splitModal.resolve;
                setSplitModal({ isOpen: false, file: null, maxPages: 0, range: '', resolve: null });
                resolveFunc(targetPages);
            };

            const handleFileSelect = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;

                    try {

                        const newItems = [];
                        const viewScale = settings.quality === 'high' ? 0.6 : 0.2;
                        const jpegQual = settings.quality === 'high' ? 0.8 : 0.4;
                        
                        if (mode === 'files') {
                            let thumb = null; let pagesCount = 1;
                            if (file.type === 'application/pdf') {
                                const pdfDoc = await PDFDocument.load(buffer.slice(0)); pagesCount = pdfDoc.getPageCount();
                                const loadingTask = pdfjsLib.getDocument(new Uint8Array(buffer.slice(0))); const pdfJsDoc = await loadingTask.promise;
                                const page = await pdfJsDoc.getPage(1); const viewport = page.getViewport({ scale: viewScale }); const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height; await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise; thumb = canvas.toDataURL('image/jpeg', jpegQual);
                            } else if (file.type.startsWith('image/')) { thumb = URL.createObjectURL(new Blob([buffer], {type: file.type})); }
                            newItems.push({ id: `file_${Date.now()}_${i}`, name: file.name, type: file.type, buffer: buffer, thumb: thumb, pagesCount: pagesCount, pageIndex: 0 });
                            setProgress(Math.round(((i + 1) / files.length) * 100));
                        } else {
                            if (file.type === 'application/pdf') {
                                setIsProcessing(false); 
                                const loadingTask = pdfjsLib.getDocument(new Uint8Array(buffer.slice(0))); 
                                const pdfJsDoc = await loadingTask.promise;

                                const targetPages = await promptPdfSplit(file, maxPages);

                                setIsProcessing(true); 
                                
                                for(let idx = 0; idx < targetPages.length; idx++) {
                                    if (abortRef.current) break;
                                    const p = targetPages[idx];
                                    setStatus(`${t.processing} ${p}`);
                                    setProgress(Math.round(((idx + 1) / targetPages.length) * 100));
                                    await yieldThread();
                                    
                                    const page = await pdfJsDoc.getPage(p);
                                    const viewport = page.getViewport({ scale: viewScale }); 
                                    const canvas = document.createElement('canvas'); canvas.width = viewport.width; canvas.height = viewport.height; 
                                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                    const thumb = canvas.toDataURL('image/jpeg', jpegQual);
                                    
                                    newItems.push({ id: `slide_${Date.now()}_${i}_p${p}`, name: `${file.name.substring(0,8)} (ص ${p})`, type: 'pdf_page', buffer: buffer, thumb: thumb, pagesCount: 1, pageIndex: p - 1 });
                                }
                            } else if (file.type.startsWith('image/')) {
                                const thumb = URL.createObjectURL(new Blob([buffer], {type: file.type}));
                                newItems.push({ id: `img_${Date.now()}_${i}`, name: file.name, type: file.type, buffer: buffer, thumb: thumb, pagesCount: 1, pageIndex: 0 });
                            }
                        }
                        if (!abortRef.current) setItems(prev => [...prev, ...newItems]);
                    } catch (err) { showNotification(err.message, 'error'); } 
                }
                setIsProcessing(false); if(fileInputRef.current) fileInputRef.current.value = '';
                if(abortRef.current) { showNotification(t.aborting, 'error'); abortRef.current = false; setProgress(0); }
            };

            const generateFileMerge = async () => {
                const mergedPdf = await PDFDocument.create();
                for (let i = 0; i < items.length; i++) {
                    if (abortRef.current) throw new Error("ABORTED");
                    setStatus(`${t.processing} ${i+1}`);
                    setProgress(Math.round(((i + 1) / items.length) * 100));
                    await yieldThread();
                    
                    const item = items[i];
                    if (item.type === 'application/pdf') {
                        const pdf = await PDFDocument.load(item.buffer.slice(0));
                        const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        copiedPages.forEach((page) => mergedPdf.addPage(page));
                    } else if (item.type.startsWith('image/')) {
                        const image = item.type.includes('png') ? await mergedPdf.embedPng(item.buffer.slice(0)) : await mergedPdf.embedJpg(item.buffer.slice(0));
                        const page = mergedPdf.addPage([image.width, image.height]);

                else if (settings.marginType === 'top') mTop += 40;

                const spacing = parseInt(settings.spacing) || 0;
                const usableW = pW - mLeft - mRight;
                const usableH = pH - mTop - mBot;
                const cellW = usableW / cols;
                const cellH = usableH / rows;
                
                let countOnPage = 0; let currentPage = null;
                const loadedPdfs = new Map();

                try {
                    for(let i=0; i<items.length; i++) {
                        if (abortRef.current) throw new Error("ABORTED");
                        setStatus(`${t.processing} ${i+1}`);
                        setProgress(Math.round(((i + 1) / items.length) * 100));
                        await yieldThread();
                        
                        if (i % grid === 0) { currentPage = doc.addPage([pW, pH]); countOnPage = 0; }
                        
                        const item = items[i];

                        if (item.type === 'blank') { 
                            const col = countOnPage % cols; const row = Math.floor(countOnPage / cols);
                            const x = mLeft + (col * cellW) + 10;
                            const yStart = pH - mTop - (row * cellH) - 30;
                            for(let line=0; line<10; line++){

                            }
                            countOnPage++; continue; 
                        }

                        let embed;
                        if(item.type === 'pdf_page') {
                            if (!loadedPdfs.has(item.buffer)) loadedPdfs.set(item.buffer, await PDFDocument.load(item.buffer.slice(0)));
                            const pdf = loadedPdfs.get(item.buffer);
                            const sourcePage = pdf.getPage(item.pageIndex);
                            embed = await doc.embedPage(sourcePage);
                        } else if (item.type.startsWith('image/')) {
                            embed = item.type.includes('png') ? await doc.embedPng(item.buffer.slice(0)) : await doc.embedJpg(item.buffer.slice(0));
                        }

                        const scale = Math.min((cellW - spacing)/embed.width, (cellH - spacing)/embed.height);
                        const w = embed.width * scale; const h = embed.height * scale;
                        
                        const col = countOnPage % cols; const row = Math.floor(countOnPage / cols);
                        const x = mLeft + (col * cellW) + ((cellW - w)/2);
                        const y = pH - mTop - ((row + 1) * cellH) + ((cellH - h)/2);
                        
                        if(item.type === 'pdf_page') currentPage.drawPage(embed, {x, y, width: w, height: h});
                        else currentPage.drawImage(embed, {x, y, width: w, height: h});
                        
                        countOnPage++;
                    }

                        }

                } finally { loadedPdfs.clear(); }

                                            )}
                                        </div>
                                        <button onClick={processMerge} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg shadow-blue-500/30 transition-transform active:scale-95 flex items-center justify-center gap-3">
                                            <Icons.Download /> <span>{t.mergeDownload}</span>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="flex flex-col sm:flex-row items-center gap-3 fade-in bg-green-50 dark:bg-emerald-900/20 border border-green-200 dark:border-emerald-800/50 p-2 rounded-2xl">
                                        <div className="flex-1 flex items-center px-2 text-green-700 dark:text-emerald-400 font-bold text-sm gap-2">
                                            <Icons.CheckCircle /> {t.fileReady}
                                        </div>
                                        <div className="flex w-full sm:w-auto gap-2">
                                            <button onClick={downloadResult} className="flex-1 sm:flex-none bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm"><Icons.Download /> {t.download}</button>
                                            <button onClick={shareResult} className="flex-1 sm:flex-none bg-emerald-100 dark:bg-emerald-800/50 text-emerald-800 dark:text-emerald-300 hover:bg-emerald-200 dark:hover:bg-emerald-700 font-bold py-2.5 px-6 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2 text-sm"><Icons.Share /> {t.share}</button>
                                            <button onClick={() => setResult(null)} className="p-2.5 text-slate-400 hover:text-slate-600 dark:hover:text-white transition"><Icons.Close /></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-2 left-0 right-0 z-[35] pointer-events-none flex justify-center opacity-40 dark:opacity-30">
                        <p className="text-[9px] font-black tracking-[0.2em] text-slate-500 dark:text-slate-400 uppercase">2026© Designed & Engineered by Ayman Farhan</p>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
