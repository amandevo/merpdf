<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge Studio Pro | By Ayman</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { appBg: '#f8fafc', accent: '#2563eb' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-bottom-color: #fff; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth transitions */
        .item-card { transition: transform 0.2s, box-shadow 0.2s; cursor: grab; }
        .item-card:active { cursor: grabbing; transform: scale(0.98); }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;
        const { PDFDocument } = PDFLib;

        // --- Icons ---
        const Icons = {
            FileMerge: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            GridMerge: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Plus: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Grip: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
        };

        function App() {
            const [mode, setMode] = useState('files');
            const [items, setItems] = useState([]); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [status, setStatus] = useState("");
            
            const [settings, setSettings] = useState({ filename: "الملف_النهائي", grid: 2 });
            const fileInputRef = useRef(null);
            
            const dragItem = useRef();
            const dragOverItem = useRef();

            useEffect(() => { setItems([]); }, [mode]);

            const handleDragStart = (e, position) => { dragItem.current = position; };
            const handleDragEnter = (e, position) => { dragOverItem.current = position; };
            const handleDrop = (e) => {
                const copyListItems = [...items];
                const dragItemContent = copyListItems[dragItem.current];
                copyListItems.splice(dragItem.current, 1);
                copyListItems.splice(dragOverItem.current, 0, dragItemContent);
                dragItem.current = null; dragOverItem.current = null;
                setItems(copyListItems);
            };

            const handleFileSelect = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setIsProcessing(true); setStatus("جاري المعالجة...");
                
                try {
                    const newItems = [];
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        const buffer = await file.arrayBuffer();
                        
                        if (mode === 'files') {
                            let thumb = null;
                            let pagesCount = 1;
                            
                            if (file.type === 'application/pdf') {
                                const pdfDoc = await PDFDocument.load(buffer.slice(0));
                                pagesCount = pdfDoc.getPageCount();
                                const loadingTask = pdfjsLib.getDocument(new Uint8Array(buffer.slice(0)));
                                const pdfJsDoc = await loadingTask.promise;
                                const page = await pdfJsDoc.getPage(1);
                                const viewport = page.getViewport({ scale: 0.3 });
                                const canvas = document.createElement('canvas');
                                canvas.width = viewport.width; canvas.height = viewport.height;
                                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                thumb = canvas.toDataURL('image/jpeg', 0.6);
                            } else if (file.type.startsWith('image/')) {
                                thumb = URL.createObjectURL(new Blob([buffer], {type: file.type}));
                            }

                            newItems.push({
                                id: `file_${Date.now()}_${i}`,
                                name: file.name,
                                type: file.type,
                                buffer: buffer,
                                thumb: thumb,
                                pagesCount: pagesCount,
                                pageIndex: 0
                            });
                        } else {
                            if (file.type === 'application/pdf') {
                                const loadingTask = pdfjsLib.getDocument(new Uint8Array(buffer.slice(0)));
                                const pdfJsDoc = await loadingTask.promise;
                                const pagesCount = pdfJsDoc.numPages;
                                
                                for(let p = 1; p <= pagesCount; p++) {
                                    setStatus(`استخراج شريحة ${p}...`);
                                    const page = await pdfJsDoc.getPage(p);
                                    const viewport = page.getViewport({ scale: 0.4 });
                                    const canvas = document.createElement('canvas');
                                    canvas.width = viewport.width; canvas.height = viewport.height;
                                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                                    const thumb = canvas.toDataURL('image/jpeg', 0.6);
                                    
                                    newItems.push({
                                        id: `slide_${Date.now()}_${i}_p${p}`,
                                        name: `${file.name.substring(0,10)} (ص ${p})`,
                                        type: 'pdf_page',
                                        buffer: buffer, 
                                        thumb: thumb,
                                        pagesCount: 1,
                                        pageIndex: p - 1 
                                    });
                                }
                            } else if (file.type.startsWith('image/')) {
                                const thumb = URL.createObjectURL(new Blob([buffer], {type: file.type}));
                                newItems.push({
                                    id: `img_${Date.now()}_${i}`,
                                    name: file.name,
                                    type: file.type,
                                    buffer: buffer,
                                    thumb: thumb,
                                    pagesCount: 1,
                                    pageIndex: 0
                                });
                            }
                        }
                    }
                    setItems(prev => [...prev, ...newItems]);
                } catch (err) { alert("حدث خطأ في قراءة الملف: " + err.message); } 
                finally { setIsProcessing(false); if(fileInputRef.current) fileInputRef.current.value = ''; }
            };

            const removeItem = (id) => setItems(items.filter(item => item.id !== id));

            const generateFileMerge = async () => {
                const mergedPdf = await PDFDocument.create();
                for (let i = 0; i < items.length; i++) {
                    setStatus(`دمج الملف ${i+1}...`);
                    const item = items[i];
                    if (item.type === 'application/pdf') {
                        const pdf = await PDFDocument.load(item.buffer.slice(0));
                        const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        copiedPages.forEach((page) => mergedPdf.addPage(page));
                    } else if (item.type.startsWith('image/')) {
                        const image = item.type.includes('png') ? await mergedPdf.embedPng(item.buffer.slice(0)) : await mergedPdf.embedJpg(item.buffer.slice(0));
                        const page = mergedPdf.addPage([image.width, image.height]);
                        page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                    }
                }
                return await mergedPdf.save();
            };

            const generateGridMerge = async () => {
                const doc = await PDFDocument.create();
                const [pW, pH] = [595.28, 841.89]; 
                const grid = settings.grid;
                let cols = 1, rows = 2;
                if(grid===1){cols=1;rows=1} else if(grid===2){cols=1;rows=2} else if(grid===4){cols=2;rows=2} else if(grid===6){cols=2;rows=3}

                const margin = 20;
                const cellW = (pW - (margin * 2)) / cols;
                const cellH = (pH - (margin * 2)) / rows;
                
                let countOnPage = 0; let currentPage = null;
                const loadedPdfs = new Map();

                for(let i=0; i<items.length; i++) {
                    setStatus(`ترتيب الشريحة ${i+1}...`);
                    if (i % grid === 0) { currentPage = doc.addPage([pW, pH]); countOnPage = 0; }
                    
                    const item = items[i];
                    let embed;

                    if(item.type === 'pdf_page') {
                        if (!loadedPdfs.has(item.buffer)) {
                            loadedPdfs.set(item.buffer, await PDFDocument.load(item.buffer.slice(0)));
                        }
                        const pdf = loadedPdfs.get(item.buffer);
                        const sourcePage = pdf.getPage(item.pageIndex);
                        embed = await doc.embedPage(sourcePage);
                    } else if (item.type.startsWith('image/')) {
                        embed = item.type.includes('png') ? await doc.embedPng(item.buffer.slice(0)) : await doc.embedJpg(item.buffer.slice(0));
                    }

                    const scale = Math.min((cellW - 10)/embed.width, (cellH - 10)/embed.height);
                    const w = embed.width * scale; const h = embed.height * scale;
                    const col = countOnPage % cols; const row = Math.floor(countOnPage / cols);
                    const x = margin + (col * cellW) + ((cellW - w)/2);
                    const y = pH - margin - ((row + 1) * cellH) + ((cellH - h)/2);
                    
                    if(item.type === 'pdf_page') currentPage.drawPage(embed, {x, y, width: w, height: h});
                    else currentPage.drawImage(embed, {x, y, width: w, height: h});
                    
                    countOnPage++;
                }
                return await doc.save();
            };

            const processMerge = async () => {
                if(items.length === 0) return;
                setIsProcessing(true);
                try {
                    let pdfBytes;
                    if (mode === 'files') {
                        pdfBytes = await generateFileMerge();
                    } else {
                        pdfBytes = await generateGridMerge();
                    }

                    setStatus("بدء التحميل...");
                    
                    // الإصلاح الجذري: إجبار الهاتف على التحميل المباشر
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const finalName = (settings.filename.trim() || "الملف_النهائي") + ".pdf";
                    
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.setAttribute('download', finalName);
                    document.body.appendChild(link);
                    link.click(); // محاكاة ضغطة المستخدم
                    document.body.removeChild(link);
                    setTimeout(() => window.URL.revokeObjectURL(url), 100);

                    setStatus("تم بنجاح!");
                } catch(e) { 
                    alert("عذراً، حدث خطأ أثناء الدمج:\n" + e.message); 
                } finally { 
                    setTimeout(() => setIsProcessing(false), 1500); 
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-800 pb-24">
                    
                    {/* Header */}
                    <header className="glass-panel sticky top-0 z-40 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div>
                            <h1 className="text-xl font-black text-slate-900 tracking-tight">ستوديو <span className="text-blue-600">الدمج</span></h1>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto relative">
                            <button onClick={() => setMode('files')} className={`flex-1 md:w-40 py-2 text-sm font-bold rounded-lg flex items-center justify-center gap-2 transition-all duration-300 ${mode === 'files' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                                <Icons.FileMerge /> دمج ملفات
                            </button>
                            <button onClick={() => setMode('slides')} className={`flex-1 md:w-40 py-2 text-sm font-bold rounded-lg flex items-center justify-center gap-2 transition-all duration-300 ${mode === 'slides' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                                <Icons.GridMerge /> دمج شرائح
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <main className="flex-1 w-full max-w-5xl mx-auto mt-8 px-4 relative z-10">
                        
                        {mode === 'slides' && (
                            <div className="mb-6 bg-blue-50 border border-blue-100 text-blue-800 p-4 rounded-xl flex items-center justify-between shadow-sm">
                                <span className="text-sm font-bold">عدد الشرائح في الصفحة الواحدة (A4):</span>
                                <select value={settings.grid} onChange={(e)=>setSettings({...settings, grid: parseInt(e.target.value)})} className="bg-white border-0 rounded-lg p-2 text-sm font-bold outline-none shadow-sm cursor-pointer">
                                    <option value="1">1 شريحة</option><option value="2">2 شريحة</option><option value="4">4 شرائح</option><option value="6">6 شرائح</option>
                                </select>
                            </div>
                        )}

                        {items.length === 0 && !isProcessing && (
                            <div className="text-center mt-20 fade-in">
                                <div className="inline-block p-6 bg-slate-50 rounded-full mb-4 border border-slate-100">
                                    <Icons.Plus />
                                </div>
                                <h2 className="text-2xl font-bold text-slate-700 mb-2">مساحة العمل فارغة</h2>
                                <p className="text-slate-500 mb-6">
                                    {mode === 'files' ? "ارفع ملفات PDF لدمجها كملزمة واحدة متصلة." : "ارفع ملف PDF وسيتم تفكيكه لشرائح لتتمكن من ترتيبها وحذفها وتجميعها."}
                                </p>
                            </div>
                        )}

                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            {items.map((item, index) => (
                                <div key={item.id} 
                                    className="item-card bg-white rounded-xl shadow-sm border border-slate-200 p-2 relative group flex flex-col"
                                    draggable
                                    onDragStart={(e) => handleDragStart(e, index)}
                                    onDragEnter={(e) => handleDragEnter(e, index)}
                                    onDragEnd={handleDrop}
                                    onDragOver={(e) => e.preventDefault()}>
                                    
                                    <div className="absolute top-2 left-2 z-10 text-slate-400 bg-white/90 backdrop-blur rounded p-1 cursor-grab active:cursor-grabbing"><Icons.Grip /></div>
                                    <button onClick={() => removeItem(item.id)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1.5 shadow-lg opacity-0 group-hover:opacity-100 transition-all z-20 hover:bg-red-600 hover:scale-110"><Icons.Trash /></button>
                                    
                                    <div className="aspect-[1/1.4] bg-slate-50 rounded-lg overflow-hidden border border-slate-100 flex items-center justify-center">
                                        {item.thumb ? <img src={item.thumb} className="w-full h-full object-cover" /> : <span className="text-slate-400 text-xs font-bold">PDF</span>}
                                    </div>
                                    
                                    <div className="mt-2 text-center truncate px-1">
                                        <span className="text-[10px] font-bold text-slate-700 block truncate" dir="ltr">{item.name}</span>
                                        <span className="text-[9px] text-slate-400 font-bold mt-0.5 block">{mode === 'files' ? `${item.pagesCount} صفحة` : 'شريحة مفردة'}</span>
                                    </div>
                                </div>
                            ))}
                            
                            {(items.length > 0 || isProcessing) && (
                                <button onClick={() => fileInputRef.current.click()} disabled={isProcessing} className="aspect-[1/1.4] bg-transparent border-2 border-dashed border-slate-300 rounded-xl flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition-all disabled:opacity-50">
                                    {isProcessing ? <div className="spinner border-slate-400 border-bottom-transparent"></div> : <><div className="bg-white p-2 rounded-full shadow-sm mb-2"><Icons.Plus /></div><span className="text-xs font-bold">رفع المزيد</span></>}
                                </button>
                            )}
                        </div>
                        
                        {items.length === 0 && !isProcessing && (
                            <div className="flex justify-center mt-4">
                                <button onClick={() => fileInputRef.current.click()} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 hover:-translate-y-1 transition-all">اختر الملفات للبدء</button>
                            </div>
                        )}

                        <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" multiple accept="application/pdf,image/*" />
                    </main>

                    {/* Footer / Dock */}
                    {items.length > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                            <div className="max-w-4xl mx-auto flex flex-col sm:flex-row items-center gap-4">
                                <div className="flex-1 w-full flex gap-2">
                                    <input type="text" placeholder="اسم الملف النهائي (مثال: الجراحة)" value={settings.filename} onChange={(e) => setSettings({...settings, filename: e.target.value})} className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-3.5 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-shadow" />
                                </div>
                                
                                <button onClick={processMerge} disabled={isProcessing} className="w-full sm:w-auto bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg transition-all flex items-center justify-center gap-3 disabled:opacity-70 disabled:scale-100 hover:scale-105">
                                    {isProcessing ? <div className="spinner"></div> : <Icons.Download />}
                                    <span>{isProcessing ? status : "دمج وتحميل الملف"}</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Signature Footer */}
                    <footer className="mt-auto pt-10 pb-6 text-center text-[11px] font-bold text-slate-400 tracking-wide">
    Designed & Developed by <span className="text-slate-800">Ayman Farhan</span> &copy; 2026
</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
